name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check src/ tests/
      - run: pytest -q
        env:
          GCP_PROJECT_ID: "energy-genai-assistant"
          BIGQUERY_DATASET: "rte_energy"
          LOG_LEVEL: "INFO"
